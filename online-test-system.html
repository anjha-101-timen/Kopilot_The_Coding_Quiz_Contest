<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Test System - Online Mode</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #7c3aed;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-bg: #1f2937;
            --light-bg: #f9fafb;
            --border-color: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: var(--dark-bg);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .online-indicator {
            background: var(--success-color);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .loading {
            background: var(--warning-color);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .error {
            background: var(--danger-color);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .test-selection {
            padding: 40px;
        }

        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .test-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid var(--primary-color);
        }

        .test-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .test-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .test-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .start-btn {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background 0.3s ease;
        }

        .start-btn:hover {
            background: #059669;
        }

        .start-btn:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
        }

        .test-interface {
            display: none;
        }

        .test-header {
            background: var(--dark-bg);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timer {
            background: var(--danger-color);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            min-width: 120px;
            text-align: center;
        }

        .test-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            height: calc(100vh - 80px);
        }

        .questions-panel {
            padding: 30px;
            overflow-y: auto;
            background: var(--light-bg);
        }

        .sidebar {
            background: white;
            border-left: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
        }

        .question-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .question-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: var(--light-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            border-color: var(--primary-color);
            background: #eff6ff;
        }

        .option.selected {
            border-color: var(--primary-color);
            background: #dbeafe;
        }

        .text-input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .nav-item {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            background: white;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            border-color: var(--primary-color);
            background: #eff6ff;
        }

        .nav-item.current {
            background: var(--primary-color);
            color: white;
        }

        .nav-item.answered {
            background: var(--success-color);
            color: white;
        }

        .submit-btn {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: #059669;
        }

        .results {
            display: none;
            padding: 40px;
            text-align: center;
        }

        .score-display {
            font-size: 4rem;
            font-weight: 800;
            margin: 20px 0;
            background: linear-gradient(135deg, #10b981, #34d399);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin: 20px 10px;
        }

        .back-btn:hover {
            background: #1d4ed8;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #fcc;
        }

        .debug-info {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Test Selection Screen -->
        <div id="testSelection" class="test-selection">
            <div class="header">
                <h1>🚀 LeetCode Test System</h1>
                <div id="statusIndicator" class="loading">
                    <span class="loading-spinner"></span> Loading...
                </div>
            </div>
            
            <h2>Select a Test to Start</h2>
            <div id="loadingMessage">Loading tests from Firebase...</div>
            <div class="test-grid" id="testGrid">
                <!-- Tests will be loaded here -->
            </div>
            <div id="debugInfo" class="debug-info" style="display: none;"></div>
        </div>

        <!-- Test Interface -->
        <div id="testInterface" class="test-interface">
            <div class="test-header">
                <div>
                    <h1 id="testTitle">Test Title</h1>
                    <div id="testSubtitle">Test Subtitle</div>
                </div>
                <div class="timer" id="timer">02:00:00</div>
                <button class="submit-btn" onclick="submitTest()">Submit Test</button>
            </div>

            <div class="test-content">
                <div class="questions-panel" id="questionsPanel">
                    <!-- Questions will be rendered here -->
                </div>

                <div class="sidebar">
                    <h3>Question Navigator</h3>
                    <div class="nav-grid" id="navGrid">
                        <!-- Navigation items will be generated here -->
                    </div>
                    
                    <div style="margin-top: 20px;">
                        <strong>Statistics:</strong><br>
                        <span id="answeredCount">0</span> answered<br>
                        <span id="remainingCount">25</span> remaining
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results" class="results">
            <h1>🎉 Test Completed!</h1>
            <div class="score-display" id="scoreDisplay">0%</div>
            <p id="resultsMessage">Great job!</p>
            
            <div>
                <button class="back-btn" onclick="backToTests()">Back to Tests</button>
                <button class="back-btn" onclick="retakeTest()">Retake Test</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js"></script>

    <script type="module">
        // Import Firebase functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, collection, getDocs, query, limit } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBTXNdFPIkgRAMSN8FYvSgaiyQ0ylz-6Ko",
            authDomain: "coding-quiz-contest-platform.firebaseapp.com",
            projectId: "coding-quiz-contest-platform",
            storageBucket: "coding-quiz-contest-platform.firebasestorage.app",
            messagingSenderId: "823102752389",
            appId: "1:823102752389:web:4e3db47f8b6234ae1c8bec",
            measurementId: "G-3YHZX8QDB9"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global variables
        let tests = [];
        let currentTest = null;
        let currentQuestion = 0;
        let answers = {};
        let timerInterval = null;
        let timeRemaining = 7200; // 2 hours in seconds

        // Initialize the application
        async function init() {
            try {
                await loadTestsFromFirebase();
                renderTestGrid();
                updateStatus('online', '🟢 Connected to Firebase');
            } catch (error) {
                console.error('Failed to load tests:', error);
                showError('Failed to load tests from Firebase. Please check your connection.');
                updateStatus('error', '🔴 Connection Failed');
            }
        }

        // Load tests from Firebase
        async function loadTestsFromFirebase() {
            try {
                console.log('Loading tests from super_leet_problems_lakh collection...');
                
                const q = query(collection(db, 'super_leet_problems_lakh'), limit(50));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    throw new Error('No tests found in Firebase. Please upload test data first.');
                }

                tests = [];
                snapshot.forEach(doc => {
                    const testData = doc.data();
                    tests.push({
                        id: doc.id,
                        name: testData.problem_name || 'Unknown Test',
                        questions: testData.questions || []
                    });
                });

                console.log(`Loaded ${tests.length} tests from Firebase`);
                
                // Hide loading message
                document.getElementById('loadingMessage').style.display = 'none';
                
                // Show debug info
                const debugInfo = document.getElementById('debugInfo');
                debugInfo.innerHTML = `
                    <strong>Debug Info:</strong><br>
                    Tests loaded: ${tests.length}<br>
                    First test: ${tests[0]?.name || 'N/A'}<br>
                    Questions in first test: ${tests[0]?.questions?.length || 0}<br>
                    Sample question types: ${tests[0]?.questions?.slice(0, 3).map(q => q.type).join(', ') || 'N/A'}
                `;
                
            } catch (error) {
                console.error('Error loading from Firebase:', error);
                
                if (error.message.includes('permission-denied')) {
                    throw new Error('Firestore API not enabled. Please enable it at: https://console.developers.google.com/apis/api/firestore.googleapis.com/overview?project=kopilot-test');
                } else {
                    throw error;
                }
            }
        }

        // Render test grid
        function renderTestGrid() {
            const testGrid = document.getElementById('testGrid');
            testGrid.innerHTML = '';

            tests.forEach(test => {
                const testCard = document.createElement('div');
                testCard.className = 'test-card';
                testCard.innerHTML = `
                    <div class="test-title">${test.name}</div>
                    <div class="test-meta">
                        ${test.questions.length} Questions • GATE Format
                    </div>
                    <button class="start-btn" onclick="startTest('${test.id}')">
                        Start Test
                    </button>
                `;
                testGrid.appendChild(testCard);
            });
        }

        // Update status indicator
        function updateStatus(status, message) {
            const indicator = document.getElementById('statusIndicator');
            indicator.className = status;
            indicator.innerHTML = message;
        }

        // Show error message
        function showError(message) {
            const testGrid = document.getElementById('testGrid');
            testGrid.innerHTML = `
                <div class="error-message">
                    <strong>Error:</strong> ${message}
                </div>
            `;
        }

        // Start a test
        function startTest(testId) {
            // Navigate to the test attempt page
            window.location.href = `./test-attempt.html?test=${encodeURIComponent(testId)}`;
        }

        // Initialize navigation
        function initNavigation() {
            const navGrid = document.getElementById('navGrid');
            navGrid.innerHTML = '';

            for (let i = 0; i < currentTest.questions.length; i++) {
                const navItem = document.createElement('div');
                navItem.className = 'nav-item';
                navItem.textContent = i + 1;
                navItem.onclick = () => goToQuestion(i);
                navItem.id = `nav-${i}`;
                navGrid.appendChild(navItem);
            }

            updateStatistics();
        }

        // Start timer
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();

                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    submitTest();
                }
            }, 1000);
        }

        // Update timer display
        function updateTimerDisplay() {
            const hours = Math.floor(timeRemaining / 3600);
            const minutes = Math.floor((timeRemaining % 3600) / 60);
            const seconds = timeRemaining % 60;
            
            const display = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timer').textContent = display;
        }

        // Render current question
        function renderCurrentQuestion() {
            const question = currentTest.questions[currentQuestion];
            const panel = document.getElementById('questionsPanel');
            
            // Update navigation
            updateNavigation();
            
            // Generate question HTML
            let questionHTML = `
                <div class="question-card">
                    <div class="question-text">
                        <strong>Question ${currentQuestion + 1} (${question.type.toUpperCase()}):</strong> ${question.question}
                    </div>
                    <div class="options-container">
            `;

            // Add options based on question type
            questionHTML += generateOptionsHTML(question);

            questionHTML += `
                    </div>
                </div>
            `;

            panel.innerHTML = questionHTML;
            updateStatistics();
        }

        // Generate options HTML based on actual Firebase data structure
        function generateOptionsHTML(question) {
            const currentAnswer = answers[question.id];
            let html = '';

            switch (question.type) {
                case 'mcq':
                    if (question.options && Array.isArray(question.options)) {
                        question.options.forEach((option, index) => {
                            html += `
                                <div class="option ${currentAnswer === index ? 'selected' : ''}" onclick="selectOption(${index})">
                                    <input type="radio" name="question-${question.id}" value="${index}" ${currentAnswer === index ? 'checked' : ''}>
                                    <span>${String.fromCharCode(65 + index)}. ${option}</span>
                                </div>
                            `;
                        });
                    }
                    break;

                case 'true_false':
                    ['True', 'False'].forEach((option, index) => {
                        html += `
                            <div class="option ${currentAnswer === index ? 'selected' : ''}" onclick="selectOption(${index})">
                                <input type="radio" name="question-${question.id}" value="${index}" ${currentAnswer === index ? 'checked' : ''}>
                                <span>${option}</span>
                            </div>
                        `;
                    });
                    break;

                case 'msq':
                    if (question.options && Array.isArray(question.options)) {
                        question.options.forEach((option, index) => {
                            const selectedAnswers = Array.isArray(currentAnswer) ? currentAnswer : [];
                            html += `
                                <div class="option ${selectedAnswers.includes(index) ? 'selected' : ''}" onclick="toggleMSQOption(${index})">
                                    <input type="checkbox" name="question-${question.id}" value="${index}" ${selectedAnswers.includes(index) ? 'checked' : ''}>
                                    <span>${String.fromCharCode(65 + index)}. ${option}</span>
                                </div>
                            `;
                        });
                    }
                    break;

                case 'nat':
                    html += `
                        <input type="number" class="text-input" placeholder="Enter numerical answer" value="${currentAnswer || ''}" onchange="selectOption(this.value)">
                    `;
                    break;

                case 'fill_blank':
                    html += `
                        <input type="text" class="text-input" placeholder="Fill in the blank" value="${currentAnswer || ''}" onchange="selectOption(this.value)">
                    `;
                    break;

                case 'one_word':
                    html += `
                        <input type="text" class="text-input" placeholder="Enter one word answer" value="${currentAnswer || ''}" onchange="selectOption(this.value)">
                    `;
                    break;

                case 'assertion_reason':
                    ['Both True', 'Assertion True Only', 'Reason True Only', 'Both False'].forEach((option, index) => {
                        html += `
                            <div class="option ${currentAnswer === index ? 'selected' : ''}" onclick="selectOption(${index})">
                                <input type="radio" name="question-${question.id}" value="${index}" ${currentAnswer === index ? 'checked' : ''}>
                                <span>${option}</span>
                            </div>
                        `;
                    });
                    break;

                case 'matching':
                    if (question.pairs && Array.isArray(question.pairs)) {
                        html += `
                            <div style="margin: 20px 0;">
                                <p><strong>Match items from Column A with Column B:</strong></p>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px;">
                                    <div>
                                        <strong>Column A</strong>
                                        ${question.pairs.map((pair, index) => `
                                            <div style="padding: 8px; background: #f9fafb; margin: 5px 0; border-radius: 4px;">
                                                ${String.fromCharCode(65 + index)}. ${pair.left}
                                            </div>
                                        `).join('')}
                                    </div>
                                    <div>
                                        <strong>Column B</strong>
                                        ${question.pairs.map((pair, index) => `
                                            <div style="padding: 8px; background: #f9fafb; margin: 5px 0; border-radius: 4px;">
                                                ${index + 1}. ${pair.right}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                <div style="margin-top: 15px;">
                                    <p><strong>Enter your answers as comma-separated pairs (e.g., A-1,B-2,C-3):</strong></p>
                                    <input type="text" class="text-input" placeholder="Enter matching pairs" value="${currentAnswer || ''}" onchange="selectOption(this.value)">
                                </div>
                            </div>
                        `;
                    }
                    break;

                default:
                    html += `<p style="color: #666;">Question type "${question.type}" not yet supported</p>`;
            }

            return html;
        }

        // Select option
        function selectOption(value) {
            const question = currentTest.questions[currentQuestion];
            answers[question.id] = value;
            renderCurrentQuestion();
        }

        // Toggle MSQ option
        function toggleMSQOption(index) {
            const question = currentTest.questions[currentQuestion];
            const currentAnswer = answers[question.id] || [];
            
            if (currentAnswer.includes(index)) {
                answers[question.id] = currentAnswer.filter(i => i !== index);
            } else {
                answers[question.id] = [...currentAnswer, index];
            }
            
            renderCurrentQuestion();
        }

        // Navigation functions
        function goToQuestion(index) {
            currentQuestion = index;
            renderCurrentQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < currentTest.questions.length - 1) {
                currentQuestion++;
                renderCurrentQuestion();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderCurrentQuestion();
            }
        }

        // Update navigation
        function updateNavigation() {
            document.querySelectorAll('.nav-item').forEach((item, index) => {
                item.classList.remove('current');
                if (index === currentQuestion) {
                    item.classList.add('current');
                }
            });
        }

        // Update statistics
        function updateStatistics() {
            const answered = Object.keys(answers).length;
            const remaining = currentTest.questions.length - answered;
            
            document.getElementById('answeredCount').textContent = answered;
            document.getElementById('remainingCount').textContent = remaining;

            // Update navigation items status
            currentTest.questions.forEach((question, index) => {
                const navItem = document.getElementById(`nav-${index}`);
                if (navItem) {
                    navItem.classList.remove('answered');
                    
                    if (answers[question.id]) {
                        navItem.classList.add('answered');
                    }
                }
            });
        }

        // Submit test
        function submitTest() {
            if (timerInterval) clearInterval(timerInterval);

            // Calculate results
            const results = calculateResults();
            
            // Show results
            showResults(results);
        }

        // Calculate results based on actual Firebase data structure
        function calculateResults() {
            let correct = 0;
            let wrong = 0;
            let notAttempted = 0;

            currentTest.questions.forEach(question => {
                const userAnswer = answers[question.id];
                
                if (!userAnswer) {
                    notAttempted++;
                    return;
                }

                let isCorrect = false;
                
                switch (question.type) {
                    case 'mcq':
                    case 'true_false':
                        isCorrect = userAnswer === question.correct_answer;
                        break;
                    case 'msq':
                        const userAnswers = Array.isArray(userAnswer) ? userAnswer.sort() : [];
                        const correctAnswers = Array.isArray(question.correct_answers) ? question.correct_answers.sort() : [];
                        isCorrect = JSON.stringify(userAnswers) === JSON.stringify(correctAnswers);
                        break;
                    case 'nat':
                        isCorrect = parseFloat(userAnswer) === parseFloat(question.correct_answer);
                        break;
                    case 'fill_blank':
                    case 'one_word':
                        isCorrect = String(userAnswer).toLowerCase().trim() === String(question.correct_answer).toLowerCase().trim();
                        break;
                    case 'assertion_reason':
                        const arMap = { 'both_true': 0, 'assertion_true': 1, 'reason_true': 2, 'both_false': 3 };
                        if (typeof question.correct_answer === 'string') {
                            isCorrect = userAnswer === arMap[question.correct_answer];
                        } else {
                            isCorrect = userAnswer === question.correct_answer;
                        }
                        break;
                    case 'matching':
                        // Basic matching validation
                        isCorrect = String(userAnswer).toLowerCase().trim() === String(question.correct_answer).toLowerCase().trim();
                        break;
                }

                if (isCorrect) {
                    correct++;
                } else {
                    wrong++;
                }
            });

            const score = Math.round((correct / currentTest.questions.length) * 100);

            return { correct, wrong, notAttempted, score };
        }

        // Show results
        function showResults(results) {
            document.getElementById('testInterface').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            
            document.getElementById('scoreDisplay').textContent = `${results.score}%`;
            
            let message = '';
            if (results.score >= 80) {
                message = '🏆 Excellent performance! You have mastered this topic!';
            } else if (results.score >= 60) {
                message = '👍 Good job! Keep practicing to improve further!';
            } else if (results.score >= 40) {
                message = '📈 Nice attempt! Review the concepts and try again!';
            } else {
                message = '📚 Keep learning! Practice makes perfect!';
            }
            
            document.getElementById('resultsMessage').textContent = message;
        }

        // Back to tests
        function backToTests() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('testSelection').style.display = 'block';
        }

        // Retake test
        function retakeTest() {
            startTest(currentTest.id);
        }

        // Initialize on load
        window.addEventListener('load', init);
        
        // Make functions globally available
        window.startTest = startTest;
        window.selectOption = selectOption;
        window.toggleMSQOption = toggleMSQOption;
        window.nextQuestion = nextQuestion;
        window.previousQuestion = previousQuestion;
        window.goToQuestion = goToQuestion;
        window.submitTest = submitTest;
        window.backToTests = backToTests;
        window.retakeTest = retakeTest;
    </script>
</body>
</html>
