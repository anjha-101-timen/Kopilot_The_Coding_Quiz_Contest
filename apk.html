<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK</title>
    <style>
        body { margin:0; font-family:system-ui,sans-serif; background:#0b0b12; color:#e5e7eb; min-height:100vh; }
        .container { max-width:900px; margin:0 auto; padding:32px 20px; }
        .card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.10); border-radius:16px; padding:24px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 style="margin:0 0 10px 0; font-size:1.75rem;">APK</h1>
            <p style="margin:0; color:#cbd5e1; line-height:1.6;">
                This page previously contained a Grok/xAI demo. The AI Generate feature and Grok API usage have been removed from this project.
            </p>
        </div>
    </div>
<!-- Global Zoom Widget -->
<div class="zoom-widget">
  <button class="zoom-btn" id="zoomOut" aria-label="Zoom out">−</button>
  <button class="zoom-btn" id="zoomIn" aria-label="Zoom in">+</button>
</div>
<script>
(function(){
  const STEP = 0.08;
  const MIN = 0.6;
  const MAX = 1.6;
  const KEY = "siteZoom";
  const root = document.documentElement;

  function getZoom(){ return parseFloat(localStorage.getItem(KEY)) || 1; }
  function setZoom(v){ v = Math.min(MAX, Math.max(MIN, v)); localStorage.setItem(KEY, v); root.style.setProperty("--zoom", v); }
  function update(){ setZoom(getZoom()); }

  document.getElementById("zoomIn")?.addEventListener("click", ()=>setZoom(getZoom()+STEP));
  document.getElementById("zoomOut")?.addEventListener("click", ()=>setZoom(getZoom()-STEP));

  document.addEventListener("keydown", e=>{
    if(e.ctrlKey || e.metaKey){
      if(e.key === "=" || e.key === "+"){ e.preventDefault(); setZoom(getZoom()+STEP); }
      if(e.key === "-"){ e.preventDefault(); setZoom(getZoom()-STEP); }
      if(e.key === "0"){ e.preventDefault(); setZoom(1); }
    }
  });

  update();
})();
</script>

</body>
</html>
