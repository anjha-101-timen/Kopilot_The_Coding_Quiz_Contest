<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Test System - Offline Mode</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #7c3aed;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-bg: #1f2937;
            --light-bg: #f9fafb;
            --border-color: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: var(--dark-bg);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .offline-indicator {
            background: var(--warning-color);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .test-selection {
            padding: 40px;
        }

        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .test-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid var(--primary-color);
        }

        .test-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .test-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .test-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .start-btn {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background 0.3s ease;
        }

        .start-btn:hover {
            background: #059669;
        }

        .test-interface {
            display: none;
        }

        .test-header {
            background: var(--dark-bg);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timer {
            background: var(--danger-color);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            min-width: 120px;
            text-align: center;
        }

        .test-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            height: calc(100vh - 80px);
        }

        .questions-panel {
            padding: 30px;
            overflow-y: auto;
            background: var(--light-bg);
        }

        .sidebar {
            background: white;
            border-left: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
        }

        .question-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .question-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: var(--light-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            border-color: var(--primary-color);
            background: #eff6ff;
        }

        .option.selected {
            border-color: var(--primary-color);
            background: #dbeafe;
        }

        .text-input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .nav-item {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            background: white;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            border-color: var(--primary-color);
            background: #eff6ff;
        }

        .nav-item.current {
            background: var(--primary-color);
            color: white;
        }

        .nav-item.answered {
            background: var(--success-color);
            color: white;
        }

        .submit-btn {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: #059669;
        }

        .results {
            display: none;
            padding: 40px;
            text-align: center;
        }

        .score-display {
            font-size: 4rem;
            font-weight: 800;
            margin: 20px 0;
            background: linear-gradient(135deg, #10b981, #34d399);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin: 20px 10px;
        }

        .back-btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Test Selection Screen -->
        <div id="testSelection" class="test-selection">
            <div class="header">
                <h1>🚀 LeetCode Test System</h1>
                <div class="offline-indicator">📴 Offline Mode</div>
            </div>
            
            <h2>Select a Test to Start</h2>
            <div class="test-grid" id="testGrid">
                <!-- Tests will be loaded here -->
            </div>
        </div>

        <!-- Test Interface -->
        <div id="testInterface" class="test-interface">
            <div class="test-header">
                <div>
                    <h1 id="testTitle">Test Title</h1>
                    <div id="testSubtitle">Test Subtitle</div>
                </div>
                <div class="timer" id="timer">02:00:00</div>
                <button class="submit-btn" onclick="submitTest()">Submit Test</button>
            </div>

            <div class="test-content">
                <div class="questions-panel" id="questionsPanel">
                    <!-- Questions will be rendered here -->
                </div>

                <div class="sidebar">
                    <h3>Question Navigator</h3>
                    <div class="nav-grid" id="navGrid">
                        <!-- Navigation items will be generated here -->
                    </div>
                    
                    <div style="margin-top: 20px;">
                        <strong>Statistics:</strong><br>
                        <span id="answeredCount">0</span> answered<br>
                        <span id="remainingCount">25</span> remaining
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results" class="results">
            <h1>🎉 Test Completed!</h1>
            <div class="score-display" id="scoreDisplay">0%</div>
            <p id="resultsMessage">Great job!</p>
            
            <div>
                <button class="back-btn" onclick="backToTests()">Back to Tests</button>
                <button class="back-btn" onclick="retakeTest()">Retake Test</button>
            </div>
        </div>
    </div>

    <script>
        // Sample test data - this simulates your Firebase data
        const testData = [
            {
                id: 'test-1',
                name: 'Two Sum',
                difficulty: 'Easy',
                questions: generateQuestions('Two Sum')
            },
            {
                id: 'test-2',
                name: 'Valid Subarrays With Exactly One Peak',
                difficulty: 'Medium',
                questions: generateQuestions('Valid Subarrays')
            },
            {
                id: 'test-3',
                name: 'Binary Search',
                difficulty: 'Easy',
                questions: generateQuestions('Binary Search')
            },
            {
                id: 'test-4',
                name: 'Dynamic Programming',
                difficulty: 'Hard',
                questions: generateQuestions('Dynamic Programming')
            },
            {
                id: 'test-5',
                name: 'Tree Traversal',
                difficulty: 'Medium',
                questions: generateQuestions('Tree Traversal')
            },
            {
                id: 'test-6',
                name: 'Graph Algorithms',
                difficulty: 'Hard',
                questions: generateQuestions('Graph Algorithms')
            },
            {
                id: 'test-7',
                name: 'String Manipulation',
                difficulty: 'Medium',
                questions: generateQuestions('String Manipulation')
            },
            {
                id: 'test-8',
                name: 'Array Operations',
                difficulty: 'Easy',
                questions: generateQuestions('Array Operations')
            }
        ];

        let currentTest = null;
        let currentQuestion = 0;
        let answers = {};
        let timerInterval = null;
        let timeRemaining = 7200; // 2 hours in seconds

        // Generate sample questions for different topics
        function generateQuestions(topic) {
            const questionTypes = ['mcq', 'true_false', 'msq', 'nat', 'fill_blank', 'assertion_reason'];
            const questions = [];

            for (let i = 1; i <= 25; i++) {
                const type = questionTypes[i % questionTypes.length];
                let question = {
                    id: i,
                    type: type,
                    question: `${topic} - Question ${i}: What is the correct approach for solving this problem?`
                };

                switch (type) {
                    case 'mcq':
                        question.options = [
                            'Brute Force Approach',
                            'Optimal Dynamic Programming',
                            'Greedy Algorithm', 
                            'Divide and Conquer'
                        ];
                        question.correct_answer = 1; // DP is usually correct
                        break;
                    case 'true_false':
                        question.question = `${topic} - Question ${i}: The optimal solution has O(n log n) time complexity.`;
                        question.correct_answer = i % 3 === 0; // Mix of true/false
                        break;
                    case 'msq':
                        question.options = [
                            'Time Complexity: O(n)',
                            'Space Complexity: O(1)',
                            'Uses Hash Table',
                            'Recursive Approach'
                        ];
                        question.correct_answers = [0, 2]; // First and third options
                        break;
                    case 'nat':
                        question.question = `${topic} - Question ${i}: What is the time complexity factor for the optimal solution?`;
                        question.correct_answer = (i * 7) % 100; // Random number
                        break;
                    case 'fill_blank':
                        question.question = `${topic} - Question ${i}: The optimal solution uses ____ data structure.`;
                        question.correct_answer = i % 2 === 0 ? 'hash' : 'stack';
                        break;
                    case 'assertion_reason':
                        question.question = `${topic} - Question ${i}: Assertion: This problem requires preprocessing. Reason: Multiple queries are involved.`;
                        question.correct_answer = 'both_true';
                        break;
                }

                questions.push(question);
            }

            return questions;
        }

        // Initialize the application
        function init() {
            loadTestGrid();
        }

        // Load test grid
        function loadTestGrid() {
            const testGrid = document.getElementById('testGrid');
            testGrid.innerHTML = '';

            testData.forEach(test => {
                const testCard = document.createElement('div');
                testCard.className = 'test-card';
                testCard.innerHTML = `
                    <div class="test-title">${test.name}</div>
                    <div class="test-meta">
                        ${test.difficulty} • 25 Questions • GATE Format
                    </div>
                    <button class="start-btn" onclick="startTest('${test.id}')">
                        Start Test
                    </button>
                `;
                testGrid.appendChild(testCard);
            });
        }
    </div>
</div>

<!-- Results Screen -->
<div id="results" class="results">
    <h1> Test Completed!</h1>
    <div class="score-display" id="scoreDisplay">0%</div>
    <p id="resultsMessage">Great job!</p>
    
    <div>
        <button class="back-btn" onclick="backToTests()">Back to Tests</button>
        <button class="back-btn" onclick="retakeTest()">Retake Test</button>
    </div>
</div>
</div>

<script>
    // Sample test data - this simulates your Firebase data
    const testData = [
        {
            id: 'test-1',
            name: 'Two Sum',
            difficulty: 'Easy',
            questions: generateQuestions('Two Sum')
        },
        {
            id: 'test-2',
            name: 'Valid Subarrays With Exactly One Peak',
            difficulty: 'Medium',
            questions: generateQuestions('Valid Subarrays')
        },
        {
            id: 'test-3',
            name: 'Binary Search',
            difficulty: 'Easy',
            questions: generateQuestions('Binary Search')
        },
        {
            id: 'test-4',
            name: 'Dynamic Programming',
            difficulty: 'Hard',
            questions: generateQuestions('Dynamic Programming')
        },
        {
            id: 'test-5',
            name: 'Tree Traversal',
            difficulty: 'Medium',
            questions: generateQuestions('Tree Traversal')
        },
        {
            id: 'test-6',
            name: 'Graph Algorithms',
            difficulty: 'Hard',
            questions: generateQuestions('Graph Algorithms')
        },
        {
            id: 'test-7',
            name: 'String Manipulation',
            difficulty: 'Medium',
            questions: generateQuestions('String Manipulation')
        },
        {
            id: 'test-8',
            name: 'Array Operations',
            difficulty: 'Easy',
            questions: generateQuestions('Array Operations')
            navGrid.innerHTML = '';

            for (let i = 0; i < 25; i++) {
                const navItem = document.createElement('div');
                navItem.className = 'nav-item';
                navItem.textContent = i + 1;
                navItem.onclick = () => goToQuestion(i);
                navItem.id = `nav-${i}`;
                navGrid.appendChild(navItem);
            }

            updateStatistics();
        }

        // Start timer
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();

                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    submitTest();
                }
            }, 1000);
        }

        // Update timer display
        function updateTimerDisplay() {
            const hours = Math.floor(timeRemaining / 3600);
            const minutes = Math.floor((timeRemaining % 3600) / 60);
            const seconds = timeRemaining % 60;
            
            const display = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timer').textContent = display;
        }

        // Render current question
        function renderCurrentQuestion() {
            const question = currentTest.questions[currentQuestion];
            const panel = document.getElementById('questionsPanel');
            
            // Update navigation
            updateNavigation();
            
            // Generate question HTML
            let questionHTML = `
                <div class="question-card">
                    <div class="question-text">
                        <strong>Question ${currentQuestion + 1}:</strong> ${question.question}
                    </div>
                    <div class="options-container">
            `;

            // Add options based on question type
            questionHTML += generateOptionsHTML(question);

            questionHTML += `
                    </div>
                </div>
            `;

            panel.innerHTML = questionHTML;
            updateStatistics();
        }

        // Generate options HTML
        function generateOptionsHTML(question) {
            const currentAnswer = answers[question.id];
            let html = '';

            switch (question.type) {
                case 'mcq':
                    question.options.forEach((option, index) => {
                        html += `
                            <div class="option ${currentAnswer === index ? 'selected' : ''}" onclick="selectOption(${index})">
                                <input type="radio" name="question-${question.id}" value="${index}" ${currentAnswer === index ? 'checked' : ''}>
                                <span>${String.fromCharCode(65 + index)}. ${option}</span>
                            </div>
                        `;
                    });
                    break;

                case 'true_false':
                    ['True', 'False'].forEach((option, index) => {
                        html += `
                            <div class="option ${currentAnswer === index ? 'selected' : ''}" onclick="selectOption(${index})">
                                <input type="radio" name="question-${question.id}" value="${index}" ${currentAnswer === index ? 'checked' : ''}>
                                <span>${option}</span>
                            </div>
                        `;
                    });
                    break;

                case 'msq':
                    question.options.forEach((option, index) => {
                        const selectedAnswers = Array.isArray(currentAnswer) ? currentAnswer : [];
                        html += `
                            <div class="option ${selectedAnswers.includes(index) ? 'selected' : ''}" onclick="toggleMSQOption(${index})">
                                <input type="checkbox" name="question-${question.id}" value="${index}" ${selectedAnswers.includes(index) ? 'checked' : ''}>
                                <span>${String.fromCharCode(65 + index)}. ${option}</span>
                            </div>
                        `;
                    });
                    break;

                case 'nat':
                    html += `
                        <input type="number" class="text-input" placeholder="Enter numerical answer" value="${currentAnswer || ''}" onchange="selectOption(this.value)">
                    `;
                    break;

                case 'fill_blank':
                    html += `
                        <input type="text" class="text-input" placeholder="Fill in the blank" value="${currentAnswer || ''}" onchange="selectOption(this.value)">
                    `;
                    break;

                case 'assertion_reason':
                    ['Both True', 'Assertion True Only', 'Reason True Only', 'Both False'].forEach((option, index) => {
                        html += `
                            <div class="option ${currentAnswer === index ? 'selected' : ''}" onclick="selectOption(${index})">
                                <input type="radio" name="question-${question.id}" value="${index}" ${currentAnswer === index ? 'checked' : ''}>
                                <span>${option}</span>
                            </div>
                        `;
                    });
                    break;
            }

            return html;
        }

        // Select option
        function selectOption(value) {
            const question = currentTest.questions[currentQuestion];
            answers[question.id] = value;
            renderCurrentQuestion();
        }

        // Toggle MSQ option
        function toggleMSQOption(index) {
            const question = currentTest.questions[currentQuestion];
            const currentAnswer = answers[question.id] || [];
            
            if (currentAnswer.includes(index)) {
                answers[question.id] = currentAnswer.filter(i => i !== index);
            } else {
                answers[question.id] = [...currentAnswer, index];
            }
            
            renderCurrentQuestion();
        }

        // Navigation functions
        function goToQuestion(index) {
            currentQuestion = index;
            renderCurrentQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < currentTest.questions.length - 1) {
                currentQuestion++;
                renderCurrentQuestion();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderCurrentQuestion();
            }
        }

        // Update navigation
        function updateNavigation() {
            document.querySelectorAll('.nav-item').forEach((item, index) => {
                item.classList.remove('current');
                if (index === currentQuestion) {
                    item.classList.add('current');
                }
            });
        }

        // Update statistics
        function updateStatistics() {
            const answered = Object.keys(answers).length;
            const remaining = 25 - answered;
            
            document.getElementById('answeredCount').textContent = answered;
            document.getElementById('remainingCount').textContent = remaining;

            // Update navigation items status
            currentTest.questions.forEach((question, index) => {
                const navItem = document.getElementById(`nav-${index}`);
                navItem.classList.remove('answered');
                
                if (answers[question.id]) {
                    navItem.classList.add('answered');
                }
            });
        }

        // Submit test
        function submitTest() {
            if (timerInterval) clearInterval(timerInterval);

            // Calculate results
            const results = calculateResults();
            
            // Show results
            showResults(results);
        }

        // Calculate results
        function calculateResults() {
            let correct = 0;
            let wrong = 0;
            let notAttempted = 0;

            currentTest.questions.forEach(question => {
                const userAnswer = answers[question.id];
                
                if (!userAnswer) {
                    notAttempted++;
                    return;
                }

                let isCorrect = false;
                
                switch (question.type) {
                    case 'mcq':
                    case 'true_false':
                        isCorrect = userAnswer === question.correct_answer;
                        break;
                    case 'msq':
                        const userAnswers = Array.isArray(userAnswer) ? userAnswer.sort() : [];
                        const correctAnswers = Array.isArray(question.correct_answers) ? question.correct_answers.sort() : [];
                        isCorrect = JSON.stringify(userAnswers) === JSON.stringify(correctAnswers);
                        break;
                    case 'nat':
                        isCorrect = parseFloat(userAnswer) === parseFloat(question.correct_answer);
                        break;
                    case 'fill_blank':
                        isCorrect = String(userAnswer).toLowerCase().trim() === String(question.correct_answer).toLowerCase().trim();
                        break;
                    case 'assertion_reason':
                        const arMap = { 'both_true': 0, 'assertion_true': 1, 'reason_true': 2, 'both_false': 3 };
                        isCorrect = userAnswer === arMap[question.correct_answer];
                        break;
                }

                if (isCorrect) {
                    correct++;
                } else {
                    wrong++;
                }
            });

            const score = Math.round((correct / 25) * 100);

            return { correct, wrong, notAttempted, score };
        }

        // Show results
        function showResults(results) {
            document.getElementById('testInterface').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            
            document.getElementById('scoreDisplay').textContent = `${results.score}%`;
            
            let message = '';
            if (results.score >= 80) {
                message = '🏆 Excellent performance! You have mastered this topic!';
            } else if (results.score >= 60) {
                message = '👍 Good job! Keep practicing to improve further!';
            } else if (results.score >= 40) {
                message = '📈 Nice attempt! Review the concepts and try again!';
            } else {
                message = '📚 Keep learning! Practice makes perfect!';
            }
            
            document.getElementById('resultsMessage').textContent = message;
        }

        // Back to tests
        function backToTests() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('testSelection').style.display = 'block';
        }

        // Retake test
        function retakeTest() {
            startTest(currentTest.id);
        }

        // Initialize on load
        window.addEventListener('load', init);
        
        // Make functions globally available
        window.startTest = startTest;
        window.selectOption = selectOption;
        window.toggleMSQOption = toggleMSQOption;
        window.nextQuestion = nextQuestion;
        window.previousQuestion = previousQuestion;
        window.goToQuestion = goToQuestion;
        window.submitTest = submitTest;
        window.backToTests = backToTests;
        window.retakeTest = retakeTest;
    </script>
</body>
</html>
