<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Results - GATE Format</title>
    <link rel="stylesheet" href="../shared/base.css">
    <link rel="stylesheet" href="../shared/nav.css">
    <link rel="stylesheet" href="../testseries/series.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #7c3aed;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-bg: #1f2937;
            --light-bg: #f9fafb;
            --border-color: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .results-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .results-header {
            background: var(--dark-bg);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .results-header h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .score-display {
            font-size: 4rem;
            font-weight: 800;
            margin: 20px 0;
            background: linear-gradient(135deg, #10b981, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-label {
            font-size: 1.2rem;
            color: #9ca3af;
            margin-bottom: 20px;
        }

        .result-status {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1rem;
        }

        .status-excellent {
            background: linear-gradient(135deg, #10b981, #34d399);
            color: white;
        }

        .status-good {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            color: white;
        }

        .status-average {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: white;
        }

        .status-poor {
            background: linear-gradient(135deg, #ef4444, #f87171);
            color: white;
        }

        .results-content {
            padding: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--light-bg);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .stat-value.correct { color: var(--success-color); }
        .stat-value.wrong { color: var(--danger-color); }
        .stat-value.not-attempted { color: var(--warning-color); }
        .stat-value.marks { color: var(--primary-color); }
        .stat-value.rank { color: var(--secondary-color); }

        .stat-label {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .performance-chart {
            background: var(--light-bg);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
        }

        .performance-chart h2 {
            margin: 0 0 20px 0;
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .chart-container {
            height: 300px;
            position: relative;
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .detailed-analysis {
            background: var(--light-bg);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
        }

        .detailed-analysis h2 {
            margin: 0 0 25px 0;
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .question-breakdown {
            display: grid;
            gap: 20px;
        }

        .question-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .question-item.correct {
            border-left-color: var(--success-color);
        }

        .question-item.wrong {
            border-left-color: var(--danger-color);
        }

        .question-item.not-attempted {
            border-left-color: var(--warning-color);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-number {
            font-weight: 600;
            color: var(--text-primary);
        }

        .question-type {
            background: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .question-text {
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .answer-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .user-answer, .correct-answer {
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .user-answer {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        .correct-answer {
            background: #d1fae5;
            border: 1px solid #a7f3d0;
            color: #065f46;
        }

        .answer-label {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .improvement-tips {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid #fbbf24;
        }

        .improvement-tips h2 {
            margin: 0 0 20px 0;
            color: #92400e;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .tips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .tip-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #fbbf24;
        }

        .tip-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .tip-title {
            font-weight: 600;
            color: #92400e;
            margin-bottom: 8px;
        }

        .tip-text {
            color: #78350f;
            font-size: 14px;
            line-height: 1.5;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: var(--secondary-color);
            color: white;
        }

        .btn-secondary:hover {
            background: #6d28d9;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.3);
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }

        @media (max-width: 768px) {
            .results-content {
                padding: 20px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .answer-comparison {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .action-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="results-container">
        <!-- Results Header -->
        <div class="results-header">
            <h1>🎯 Test Results</h1>
            <div class="score-display" id="scoreDisplay">0%</div>
            <div class="score-label">Overall Score</div>
            <div class="result-status" id="resultStatus">Calculating...</div>
        </div>

        <!-- Results Content -->
        <div class="results-content">
            <!-- Statistics Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value correct" id="correctCount">0</div>
                    <div class="stat-label">Correct Answers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value wrong" id="wrongCount">0</div>
                    <div class="stat-label">Wrong Answers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value not-attempted" id="notAttemptedCount">0</div>
                    <div class="stat-label">Not Attempted</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value marks" id="totalMarks">0</div>
                    <div class="stat-label">Total Marks</div>
                </div>
            </div>

            <!-- Performance Chart -->
            <div class="performance-chart">
                <h2>📊 Performance Analysis</h2>
                <div class="chart-container">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>

            <!-- Improvement Tips -->
            <div class="improvement-tips">
                <h2>💡 Improvement Tips</h2>
                <div class="tips-grid" id="tipsGrid">
                    <!-- Tips will be generated here -->
                </div>
            </div>

            <!-- Detailed Analysis -->
            <div class="detailed-analysis">
                <h2>📋 Detailed Question Analysis</h2>
                <div class="question-breakdown" id="questionBreakdown">
                    <!-- Question breakdown will be generated here -->
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="action-btn btn-primary" onclick="reviewMistakes()">Review Mistakes</button>
                <button class="action-btn btn-secondary" onclick="retakeTest()">Retake Test</button>
                <button class="action-btn btn-success" onclick="goToDashboard()">Back to Tests</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js"></script>

    <script type="module">
        // Import Firebase functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBTXNdFPIkgRAMSN8FYvSgaiyQ0ylz-6Ko",
            authDomain: "coding-quiz-contest-platform.firebaseapp.com",
            projectId: "coding-quiz-contest-platform",
            storageBucket: "coding-quiz-contest-platform.firebasestorage.app",
            messagingSenderId: "823102752389",
            appId: "1:823102752389:web:4e3db47f8b6234ae1c8bec",
            measurementId: "G-3YHZX8QDB9"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global variables
        let sessionData = null;
        let testData = null;
        let results = null;

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        const score = urlParams.get('score');

        // Initialize results page
        async function initializeResults() {
            try {
                // Load session data
                if (sessionId) {
                    const sessionDoc = await getDoc(doc(db, 'leet_test_sessions', sessionId));
                    if (sessionDoc.exists()) {
                        sessionData = sessionDoc.data();
                        results = sessionData.results;
                        
                        // Load test data
                        const testDoc = await getDoc(doc(db, 'super_leet_problems_lakh', sessionData.test_id));
                        if (testDoc.exists()) {
                            testData = testDoc.data();
                            
                            // Display results
                            displayResults();
                            generateAnalysis();
                            createPerformanceChart();
                        }
                    }
                } else {
                    // Use score from URL if available
                    if (score) {
                        displayBasicResults(parseInt(score));
                    }
                }
            } catch (error) {
                console.error('Error loading results:', error);
            }
        }

        // Display results
        function displayResults() {
            if (!results) return;

            // Update score display
            document.getElementById('scoreDisplay').textContent = `${results.score}%`;
            
            // Update statistics
            document.getElementById('correctCount').textContent = results.correct;
            document.getElementById('wrongCount').textContent = results.wrong;
            document.getElementById('notAttemptedCount').textContent = results.notAttempted;
            document.getElementById('totalMarks').textContent = results.totalMarks.toFixed(2);
            
            // Update status
            updateResultStatus(results.score);
        }

        // Display basic results (if no session data)
        function displayBasicResults(score) {
            document.getElementById('scoreDisplay').textContent = `${score}%`;
            updateResultStatus(score);
        }

        // Update result status
        function updateResultStatus(score) {
            const statusElement = document.getElementById('resultStatus');
            
            if (score >= 80) {
                statusElement.textContent = '🏆 Excellent Performance!';
                statusElement.className = 'result-status status-excellent';
            } else if (score >= 60) {
                statusElement.textContent = '👍 Good Performance!';
                statusElement.className = 'result-status status-good';
            } else if (score >= 40) {
                statusElement.textContent = '📈 Average Performance';
                statusElement.className = 'result-status status-average';
            } else {
                statusElement.textContent = '📚 Need Improvement';
                statusElement.className = 'result-status status-poor';
            }
        }

        // Generate analysis
        function generateAnalysis() {
            if (!testData || !results) return;

            // Generate improvement tips
            generateImprovementTips();
            
            // Generate question breakdown
            generateQuestionBreakdown();
        }

        // Generate improvement tips
        function generateImprovementTips() {
            const tipsGrid = document.getElementById('tipsGrid');
            const tips = [];

            // Analyze performance by question type
            const typePerformance = {};
            testData.questions.forEach((question, index) => {
                const answer = sessionData.answers[question.id];
                if (!typePerformance[question.type]) {
                    typePerformance[question.type] = { total: 0, correct: 0 };
                }
                typePerformance[question.type].total++;
                
                if (answer && isAnswerCorrect(question, answer)) {
                    typePerformance[question.type].correct++;
                }
            });

            // Generate tips based on performance
            Object.entries(typePerformance).forEach(([type, perf]) => {
                const accuracy = (perf.correct / perf.total) * 100;
                
                if (accuracy < 50) {
                    tips.push({
                        icon: '📚',
                        title: `Improve ${getQuestionTypeLabel(type)} Questions`,
                        text: `You scored ${accuracy.toFixed(0)}% on ${getQuestionTypeLabel(type)} questions. Focus on practicing these question types.`
                    });
                }
            });

            // General tips
            if (results.score < 70) {
                tips.push({
                    icon: '⏰',
                    title: 'Time Management',
                    text: 'Practice time-bound tests to improve speed and accuracy. Allocate time wisely for each question.'
                });
            }

            if (results.notAttempted > results.total * 0.2) {
                tips.push({
                    icon: '🎯',
                    title: 'Attempt More Questions',
                    text: 'You left ${results.notAttempted} questions unattempted. Try to attempt all questions to maximize your score.'
                });
            }

            // Add default tip if no specific tips
            if (tips.length === 0) {
                tips.push({
                    icon: '🌟',
                    title: 'Excellent Work!',
                    text: 'Great performance! Keep practicing and challenge yourself with more difficult problems.'
                });
            }

            // Render tips
            tipsGrid.innerHTML = tips.map(tip => `
                <div class="tip-card">
                    <div class="tip-icon">${tip.icon}</div>
                    <div class="tip-title">${tip.title}</div>
                    <div class="tip-text">${tip.text}</div>
                </div>
            `).join('');
        }

        // Generate question breakdown
        function generateQuestionBreakdown() {
            const breakdown = document.getElementById('questionBreakdown');
            
            const questionsHTML = testData.questions.map((question, index) => {
                const userAnswer = sessionData.answers[question.id];
                const isCorrect = userAnswer && isAnswerCorrect(question, userAnswer);
                const status = !userAnswer ? 'not-attempted' : (isCorrect ? 'correct' : 'wrong');
                
                return `
                    <div class="question-item ${status}">
                        <div class="question-header">
                            <div class="question-number">Question ${index + 1}</div>
                            <div class="question-type">${getQuestionTypeLabel(question.type)}</div>
                        </div>
                        <div class="question-text">${question.question}</div>
                        ${userAnswer ? `
                            <div class="answer-comparison">
                                <div class="user-answer">
                                    <div class="answer-label">Your Answer:</div>
                                    <div>${formatAnswer(question, userAnswer)}</div>
                                </div>
                                <div class="correct-answer">
                                    <div class="answer-label">Correct Answer:</div>
                                    <div>${formatAnswer(question, question.correct_answer || question.correct_answers)}</div>
                                </div>
                            </div>
                        ` : '<div style="color: #92400e; font-style: italic;">Not Attempted</div>'}
                    </div>
                `;
            }).join('');
            
            breakdown.innerHTML = questionsHTML;
        }

        // Check if answer is correct
        function isAnswerCorrect(question, userAnswer) {
            switch (question.type) {
                case 'mcq':
                case 'true_false':
                    return userAnswer === question.correct_answer;
                case 'assertion_reason':
                    // Handle assertion_reason with string comparison
                    const arMap = {
                        'both_true': 0,
                        'assertion_true': 1,
                        'reason_true': 2,
                        'both_false': 3
                    };
                    if (typeof question.correct_answer === 'string') {
                        return userAnswer === arMap[question.correct_answer];
                    } else {
                        return userAnswer === question.correct_answer;
                    }
                case 'msq':
                    const userAnswers = Array.isArray(userAnswer) ? userAnswer.sort() : [];
                    const correctAnswers = Array.isArray(question.correct_answers) ? question.correct_answers.sort() : [];
                    return JSON.stringify(userAnswers) === JSON.stringify(correctAnswers);
                case 'nat':
                    // Handle numeric comparison for NAT
                    const userNum = parseFloat(userAnswer);
                    const correctNum = parseFloat(question.correct_answer);
                    return !isNaN(userNum) && userNum === correctNum;
                case 'fill_blank':
                case 'one_word':
                    // Handle text comparison with case insensitivity
                    return String(userAnswer).toLowerCase().trim() === String(question.correct_answer).toLowerCase().trim();
                case 'matching':
                    // Handle matching questions
                    return JSON.stringify(userAnswer) === JSON.stringify(question.correct_answer);
                default:
                    return false;
            }
        }

        // Format answer for display
        function formatAnswer(question, answer) {
            if (!answer) return 'Not answered';

            switch (question.type) {
                case 'mcq':
                case 'true_false':
                    return question.options[answer] || answer;
                case 'assertion_reason':
                    const arOptions = ['Both True', 'Assertion True Only', 'Reason True Only', 'Both False'];
                    return arOptions[answer] || answer;
                case 'msq':
                    if (Array.isArray(answer)) {
                        return answer.map(idx => question.options[idx]).join(', ');
                    }
                    return answer;
                case 'nat':
                    return answer;
                case 'fill_blank':
                case 'one_word':
                    return answer;
                case 'matching':
                    if (Array.isArray(answer)) {
                        return answer.map(pair => `${pair.left} → ${pair.right}`).join(', ');
                    }
                    return answer;
                default:
                    return answer;
            }
        }

        // Get question type label
        function getQuestionTypeLabel(type) {
            const labels = {
                'mcq': 'MCQ',
                'msq': 'MSQ',
                'nat': 'NAT',
                'fill_blank': 'Fill Blank',
                'one_word': 'One Word',
                'true_false': 'True/False',
                'assertion_reason': 'Assertion Reason',
                'matching': 'Matching'
            };
            return labels[type] || type.toUpperCase();
        }

        // Create performance chart
        function createPerformanceChart() {
            const canvas = document.getElementById('performanceChart');
            const ctx = canvas.getContext('2d');
            
            // Set canvas size
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            // Simple bar chart
            const data = [
                { label: 'Correct', value: results.correct, color: '#10b981' },
                { label: 'Wrong', value: results.wrong, color: '#ef4444' },
                { label: 'Not Attempted', value: results.notAttempted, color: '#f59e0b' }
            ];
            
            const barWidth = 80;
            const spacing = 40;
            const maxValue = Math.max(...data.map(d => d.value));
            const chartHeight = canvas.height - 60;
            
            // Draw bars
            data.forEach((item, index) => {
                const x = 50 + (index * (barWidth + spacing));
                const barHeight = (item.value / maxValue) * chartHeight;
                const y = canvas.height - barHeight - 30;
                
                // Draw bar
                ctx.fillStyle = item.color;
                ctx.fillRect(x, y, barWidth, barHeight);
                
                // Draw value
                ctx.fillStyle = '#374151';
                ctx.font = 'bold 16px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(item.value, x + barWidth / 2, y - 10);
                
                // Draw label
                ctx.font = '14px Inter';
                ctx.fillText(item.label, x + barWidth / 2, canvas.height - 10);
            });
        }

        // Action functions
        function reviewMistakes() {
            const wrongQuestions = document.querySelectorAll('.question-item.wrong');
            if (wrongQuestions.length > 0) {
                wrongQuestions[0].scrollIntoView({ behavior: 'smooth' });
            }
        }

        function retakeTest() {
            if (confirm('Start a new attempt? Your current results will be saved.')) {
                window.location.href = new URL(`../testseries/series.html?series=leetcode`, import.meta.url).href;
            }
        }

        function goToDashboard() {
            window.location.href = new URL(`../testseries/series.html?series=leetcode`, import.meta.url).href;
        }

        // Make functions globally available
        window.reviewMistakes = reviewMistakes;
        window.retakeTest = retakeTest;
        window.goToDashboard = goToDashboard;

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeResults);
    </script>
</body>
</html>
