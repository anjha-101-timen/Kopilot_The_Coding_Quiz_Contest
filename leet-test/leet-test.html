<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Test - Interactive Quiz</title>
    <link rel="stylesheet" href="../shared/base.css">
    <link rel="stylesheet" href="../shared/nav.css">
    <link rel="stylesheet" href="../testseries/series.css">
    <style>
        .leet-test-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .test-header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .test-info h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            color: #4ade80;
        }
        
        .test-progress {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .progress-bar {
            width: 200px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22d3ee);
            transition: width 0.3s ease;
        }
        
        .timer {
            font-size: 18px;
            font-weight: bold;
            color: #fbbf24;
            min-width: 80px;
        }
        
        .question-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .question-number {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .question-type {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 14px;
        }
        
        .question-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .option:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
            transform: translateX(5px);
        }
        
        .option.selected {
            background: rgba(74, 222, 128, 0.2);
            border-color: #4ade80;
        }
        
        .option input[type="checkbox"],
        .option input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #4ade80;
        }
        
        .text-input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .text-input:focus {
            outline: none;
            border-color: #4ade80;
            background: rgba(255,255,255,0.1);
        }
        
        .matching-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .matching-column {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
        }
        
        .matching-item {
            padding: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .matching-item:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }
        
        .nav-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #ef4444, #f97316);
        }
        
        .submit-btn:hover {
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }
        
        .question-nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .question-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .question-dot.current {
            background: linear-gradient(135deg, #4ade80, #22d3ee);
            border-color: #4ade80;
            transform: scale(1.1);
        }
        
        .question-dot.answered {
            background: rgba(74, 222, 128, 0.3);
            border-color: #4ade80;
        }
        
        .question-dot.unanswered {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }
        
        .question-dot:hover {
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.4);
        }
        
        @media (max-width: 768px) {
            .leet-test-container {
                padding: 10px;
            }
            
            .test-header {
                flex-direction: column;
                text-align: center;
            }
            
            .test-progress {
                flex-direction: column;
                gap: 10px;
            }
            
            .progress-bar {
                width: 100%;
            }
            
            .matching-container {
                grid-template-columns: 1fr;
            }
            
            .navigation-buttons {
                flex-direction: column;
            }
            
            .nav-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="leet-test-container">
        <div class="test-header">
            <div class="test-info">
                <h1 id="testTitle">Loading Test...</h1>
                <div class="test-meta">
                    <span id="questionProgress">Question 1 of 25</span>
                </div>
            </div>
            <div class="test-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 4%"></div>
                </div>
                <div class="timer" id="timer">00:00</div>
            </div>
        </div>

        <div class="question-nav" id="questionNav">
            <!-- Question navigation dots will be generated here -->
        </div>

        <div class="question-container" id="questionContainer">
            <div class="question-header">
                <div class="question-number" id="questionNumber">Question 1</div>
                <div class="question-type" id="questionType">MCQ</div>
            </div>
            <div class="question-text" id="questionText">
                Loading question...
            </div>
            <div class="options-container" id="optionsContainer">
                <!-- Options will be generated here -->
            </div>
        </div>

        <div class="navigation-buttons">
            <button class="nav-btn" id="prevBtn" onclick="previousQuestion()">Previous</button>
            <button class="nav-btn" id="nextBtn" onclick="nextQuestion()">Next</button>
            <button class="nav-btn submit-btn" id="submitBtn" onclick="submitTest()">Submit Test</button>
        </div>
    </div>

    <script type="module">
        import { getTestById, resumeTestSession, submitLeetCodeAnswer, finishLeetCodeTest } from '../leet_test_integration.js';
        import { getDeviceId } from '../shared/attempts.js';
        import { toast } from '../shared/ui.js';

        let currentTest = null;
        let currentQuestion = 0;
        let answers = {};
        let sessionStartTime = Date.now();
        let questionStartTime = Date.now();
        let sessionId = null;
        let testId = null;

        // Initialize test
        async function initializeTest() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                sessionId = urlParams.get('session');
                testId = urlParams.get('test');
                const isResume = urlParams.get('resume') === 'true';

                if (sessionId && isResume) {
                    // Resume existing session
                    const session = await resumeTestSession(sessionId);
                    if (session) {
                        currentTest = await getTestById(session.test_id);
                        currentQuestion = session.current_question || 0;
                        answers = session.answers || {};
                        sessionStartTime = new Date(session.started_at).getTime();
                    } else {
                        toast('Unable to resume session', 'error');
                        return;
                    }
                } else if (testId) {
                    // Start new session
                    currentTest = await getTestById(testId);
                    if (!currentTest) {
                        toast('Test not found', 'error');
                        return;
                    }
                } else {
                    toast('Invalid test parameters', 'error');
                    return;
                }

                // Initialize UI
                document.getElementById('testTitle').textContent = currentTest.problem_name;
                generateQuestionNav();
                displayQuestion();
                startTimer();

            } catch (error) {
                console.error('Error initializing test:', error);
                toast('Failed to load test', 'error');
            }
        }

        function generateQuestionNav() {
            const navContainer = document.getElementById('questionNav');
            navContainer.innerHTML = '';

            for (let i = 0; i < currentTest.questions.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'question-dot unanswered';
                dot.textContent = i + 1;
                dot.onclick = () => goToQuestion(i);
                dot.id = `question-dot-${i}`;
                navContainer.appendChild(dot);
            }
        }

        function displayQuestion() {
            const question = currentTest.questions[currentQuestion];
            questionStartTime = Date.now();

            // Update progress
            updateProgress();

            // Update question info
            document.getElementById('questionNumber').textContent = `Question ${currentQuestion + 1}`;
            document.getElementById('questionType').textContent = question.type.toUpperCase();
            document.getElementById('questionText').textContent = question.question;

            // Update navigation dots
            updateQuestionNav();

            // Generate options based on question type
            generateOptions(question);

            // Update navigation buttons
            updateNavigationButtons();
        }

        function generateOptions(question) {
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            const currentAnswer = answers[question.id] || null;

            switch (question.type) {
                case 'mcq':
                    generateMCQOptions(question, currentAnswer);
                    break;
                case 'true_false':
                    generateTrueFalseOptions(question, currentAnswer);
                    break;
                case 'msq':
                    generateMSQOptions(question, currentAnswer);
                    break;
                case 'nat':
                    generateNATOptions(question, currentAnswer);
                    break;
                case 'fill_blank':
                case 'one_word':
                    generateTextOptions(question, currentAnswer);
                    break;
                case 'assertion_reason':
                    generateAssertionReasonOptions(question, currentAnswer);
                    break;
                case 'matching':
                    generateMatchingOptions(question, currentAnswer);
                    break;
            }
        }

        function generateMCQOptions(question, currentAnswer) {
            const container = document.getElementById('optionsContainer');
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                if (currentAnswer === index) optionDiv.classList.add('selected');
                
                optionDiv.innerHTML = `
                    <input type="radio" name="answer" value="${index}" ${currentAnswer === index ? 'checked' : ''}>
                    <span>${option}</span>
                `;
                
                optionDiv.onclick = () => selectOption(index);
                container.appendChild(optionDiv);
            });
        }

        function generateTrueFalseOptions(question, currentAnswer) {
            const container = document.getElementById('optionsContainer');
            const options = ['True', 'False'];
            
            options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                if (currentAnswer === index) optionDiv.classList.add('selected');
                
                optionDiv.innerHTML = `
                    <input type="radio" name="answer" value="${index}" ${currentAnswer === index ? 'checked' : ''}>
                    <span>${option}</span>
                `;
                
                optionDiv.onclick = () => selectOption(index);
                container.appendChild(optionDiv);
            });
        }

        function generateMSQOptions(question, currentAnswer) {
            const container = document.getElementById('optionsContainer');
            const selectedAnswers = Array.isArray(currentAnswer) ? currentAnswer : [];
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                if (selectedAnswers.includes(index)) optionDiv.classList.add('selected');
                
                optionDiv.innerHTML = `
                    <input type="checkbox" value="${index}" ${selectedAnswers.includes(index) ? 'checked' : ''}>
                    <span>${option}</span>
                `;
                
                optionDiv.onclick = () => toggleMSQOption(index);
                container.appendChild(optionDiv);
            });
        }

        function generateNATOptions(question, currentAnswer) {
            const container = document.getElementById('optionsContainer');
            
            const input = document.createElement('input');
            input.type = 'number';
            input.className = 'text-input';
            input.placeholder = 'Enter your answer';
            input.value = currentAnswer || '';
            
            input.onchange = () => selectOption(input.value);
            container.appendChild(input);
        }

        function generateTextOptions(question, currentAnswer) {
            const container = document.getElementById('optionsContainer');
            
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'text-input';
            input.placeholder = question.type === 'fill_blank' ? 'Fill in the blank' : 'Enter one word answer';
            input.value = currentAnswer || '';
            
            input.onchange = () => selectOption(input.value);
            container.appendChild(input);
        }

        function generateAssertionReasonOptions(question, currentAnswer) {
            const container = document.getElementById('optionsContainer');
            const options = ['Both True', 'Assertion True', 'Reason True', 'Neither True'];
            
            options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                if (currentAnswer === index) optionDiv.classList.add('selected');
                
                optionDiv.innerHTML = `
                    <input type="radio" name="answer" value="${index}" ${currentAnswer === index ? 'checked' : ''}>
                    <span>${option}</span>
                `;
                
                optionDiv.onclick = () => selectOption(index);
                container.appendChild(optionDiv);
            });
        }

        function generateMatchingOptions(question, currentAnswer) {
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '<p>Match items from left column with right column:</p>';
            
            const matchingContainer = document.createElement('div');
            matchingContainer.className = 'matching-container';
            
            const leftColumn = document.createElement('div');
            leftColumn.className = 'matching-column';
            leftColumn.innerHTML = '<h4>Column A</h4>';
            
            const rightColumn = document.createElement('div');
            rightColumn.className = 'matching-column';
            rightColumn.innerHTML = '<h4>Column B</h4>';
            
            question.pairs.forEach((pair, index) => {
                const leftItem = document.createElement('div');
                leftItem.className = 'matching-item';
                leftItem.textContent = pair.left;
                leftItem.onclick = () => selectMatchingItem('left', index);
                leftColumn.appendChild(leftItem);
                
                const rightItem = document.createElement('div');
                rightItem.className = 'matching-item';
                rightItem.textContent = pair.right;
                rightItem.onclick = () => selectMatchingItem('right', index);
                rightColumn.appendChild(rightItem);
            });
            
            matchingContainer.appendChild(leftColumn);
            matchingContainer.appendChild(rightColumn);
            container.appendChild(matchingContainer);
        }

        function selectOption(value) {
            const question = currentTest.questions[currentQuestion];
            const timeSpent = Date.now() - questionStartTime;
            
            answers[question.id] = {
                answer: value,
                time_spent: timeSpent,
                answered_at: new Date().toISOString()
            };
            
            // Update UI
            updateQuestionNav();
            
            // Auto-save to Firebase
            if (sessionId) {
                submitLeetCodeAnswer(sessionId, question.id, value, timeSpent);
            }
        }

        function toggleMSQOption(index) {
            const question = currentTest.questions[currentQuestion];
            const currentAnswer = answers[question.id]?.answer || [];
            const newAnswer = [...currentAnswer];
            
            const optionIndex = newAnswer.indexOf(index);
            if (optionIndex > -1) {
                newAnswer.splice(optionIndex, 1);
            } else {
                newAnswer.push(index);
            }
            
            selectOption(newAnswer);
        }

        function selectMatchingItem(column, index) {
            // Simplified matching logic - can be enhanced
            console.log(`Selected ${column} item ${index}`);
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                displayQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestion < currentTest.questions.length - 1) {
                currentQuestion++;
                displayQuestion();
            }
        }

        function goToQuestion(index) {
            currentQuestion = index;
            displayQuestion();
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / currentTest.questions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('questionProgress').textContent = `Question ${currentQuestion + 1} of ${currentTest.questions.length}`;
        }

        function updateQuestionNav() {
            for (let i = 0; i < currentTest.questions.length; i++) {
                const dot = document.getElementById(`question-dot-${i}`);
                dot.classList.remove('current', 'answered', 'unanswered');
                
                if (i === currentQuestion) {
                    dot.classList.add('current');
                } else if (answers[currentTest.questions[i].id]) {
                    dot.classList.add('answered');
                } else {
                    dot.classList.add('unanswered');
                }
            }
        }

        function updateNavigationButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            prevBtn.disabled = currentQuestion === 0;
            nextBtn.disabled = currentQuestion === currentTest.questions.length - 1;
        }

        function startTimer() {
            setInterval(() => {
                const elapsed = Date.now() - sessionStartTime;
                const minutes = Math.floor(elapsed / 60000);
                const seconds = Math.floor((elapsed % 60000) / 1000);
                document.getElementById('timer').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        async function submitTest() {
            if (!confirm('Are you sure you want to submit the test?')) {
                return;
            }
            
            try {
                toast('Submitting test...', 'info');
                
                const results = await finishLeetCodeTest(sessionId);
                
                if (results) {
                    toast(`Test completed! Score: ${results.score}%`, 'success');
                    setTimeout(() => {
                        window.location.href = new URL(`./analyze.html?session=${encodeURIComponent(sessionId)}`, import.meta.url).href;
                    }, 2000);
                } else {
                    toast('Failed to submit test', 'error');
                }
            } catch (error) {
                console.error('Error submitting test:', error);
                toast('Failed to submit test', 'error');
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeTest);
    </script>
</body>
</html>
