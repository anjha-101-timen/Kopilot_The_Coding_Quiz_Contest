<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Round • Coding Quiz Contest</title>
  <link rel="stylesheet" href="/shared/base.css" />
  <link rel="stylesheet" href="/shared/level.css" />
  <link rel="stylesheet" href="/shared/nav.css" />
  <link rel="stylesheet" href="/shared/page.css" />
  <link rel="stylesheet" href="/play/play.css" />
</head>
<body>
  <div class="bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="grid"></div>
  </div>

  <header class="topbar">
    <div class="brand">
      <div class="logo"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <div>
        <div class="brandTitle">Coding Quiz Contest</div>
        <div class="brandSub">Contest Mode</div>
      </div>
    </div>

    <nav class="nav">
      <a class="navLink" href="/index.html">Home</a>
      <a class="navLink" href="/read/read.html">Contests</a>
      <a class="navLink" href="/create/create.html">Create</a>
      <a class="navLink" href="/update/update.html">Update</a>
      <a class="navLink" href="/delete/delete.html">Delete</a>
      <a class="navLink" href="/leaderboard/leaderboard.html">Leaderboard</a>
      <a class="navLink" href="/about/about.html">About</a>
      <a class="navLink" href="/contact/contact.html">Contact</a>
      <a class="navLink" href="/refer/refer.html">Refer & Earn</a>
    </nav>

    <div class="pill" id="statusPill"><span class="pulse"></span><span class="pillText">Connecting…</span></div>
  </header>

  <main class="container">
    <section class="attemptHead card">
      <div class="attemptLeft">
        <div class="attemptTitle" id="examTitle">Loading…</div>
        <div class="attemptMeta" id="examMeta"></div>
      </div>

      <div class="attemptRight">
        <div class="timerBox">
          <div class="timerLabel">Question Timer</div>
          <div class="timerValue" id="timer">00:00</div>
          <div class="timerHint">Runs only while this question is on screen</div>
        </div>
        <button class="btn ghost" id="btnSubmit">Submit Round</button>
      </div>
    </section>

    <section class="attemptShell">
      <aside class="palette card">
        <div class="palHead">
          <div class="palTitle">Question Palette</div>
          <div class="palLegend">
            <span class="lg ans"></span><span class="small">Answered</span>
            <span class="lg rev"></span><span class="small">Review</span>
            <span class="lg vis"></span><span class="small">Visited</span>
          </div>
        </div>
        <div class="palGrid" id="palette"></div>
      </aside>

      <section class="stage card">
        <div class="stageTop">
          <div class="mono" id="qMeta">Q—</div>
          <div class="row">
            <button class="btn ghost" id="btnClearResp">Clear Response</button>
            <button class="btn" id="btnMark">Mark for Review</button>
          </div>
        </div>

        <div class="stageBody" id="qHost"></div>

        <div class="stageFooter">
          <button class="btn ghost" id="btnPrev">Prev</button>
          <div class="spacer"></div>
          <button class="btn ghost" id="btnSavePrev">Save & Prev</button>
          <button class="btn" id="btnSaveNext">Save & Next</button>
          <button class="btn primary" id="btnNext">Next</button>
        </div>
      </section>
    </section>
  </main>

  <div class="dialogBackdrop" id="submitBackdrop" aria-hidden="true">
    <div class="dialog" role="dialog" aria-modal="true" aria-label="Submit round">
      <div class="dialogHeader">
        <div class="dialogTitle">Submit Round</div>
        <div class="spacer"></div>
        <span class="kbd">Esc</span>
      </div>
      <div class="dialogBody" id="submitBody"></div>
      <div class="dialogFooter">
        <button class="btn ghost" id="btnCancelSubmit">Cancel</button>
        <button class="btn primary" id="btnConfirmSubmit">Submit</button>
      </div>
    </div>
  </div>

  <div class="toastHost" id="toastHost"></div>

  <script type="module" src="/shared/firebase.js"></script>
  <script type="module" src="/shared/ui.js"></script>
  <script type="module" src="/shared/level.js"></script>
  <script type="module" src="/shared/theme.js"></script>
  <script type="module" src="/shared/nav.js"></script>
  <script type="module" src="/shared/questions.js"></script>
  <script type="module" src="/shared/exams.js"></script>
  <script type="module" src="/play/play.js"></script>
<!-- Global Zoom Widget -->
<div class="zoom-widget">
  <button class="zoom-btn" id="zoomOut" aria-label="Zoom out">−</button>
  <button class="zoom-btn" id="zoomIn" aria-label="Zoom in">+</button>
</div>
<script>
(function(){
  const STEP = 0.08;
  const MIN = 0.6;
  const MAX = 1.6;
  const KEY = "siteZoom";
  const root = document.documentElement;

  function getZoom(){ return parseFloat(localStorage.getItem(KEY)) || 1; }
  function setZoom(v){ v = Math.min(MAX, Math.max(MIN, v)); localStorage.setItem(KEY, v); root.style.setProperty("--zoom", v); }
  function update(){ setZoom(getZoom()); }

  document.getElementById("zoomIn")?.addEventListener("click", ()=>setZoom(getZoom()+STEP));
  document.getElementById("zoomOut")?.addEventListener("click", ()=>setZoom(getZoom()-STEP));

  document.addEventListener("keydown", e=>{
    if(e.ctrlKey || e.metaKey){
      if(e.key === "=" || e.key === "+"){ e.preventDefault(); setZoom(getZoom()+STEP); }
      if(e.key === "-"){ e.preventDefault(); setZoom(getZoom()-STEP); }
      if(e.key === "0"){ e.preventDefault(); setZoom(1); }
    }
  });

  update();
})();
</script>

</body>
</html>
